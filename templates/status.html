<!DOCTYPE html>
<html>
<head>
    <title>Uptime Monitor - Status Page</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial; margin: 40px; background:#f7f7f7; }
        h1 { text-align:center; }
        .monitor { background:white; border-radius:8px; padding:20px; margin-bottom:20px; box-shadow:0 2px 6px rgba(0,0,0,0.1); }
        .up { color:green; font-weight:bold; }
        .down { color:red; font-weight:bold; }
        canvas { margin-top:10px; }
    </style>
</head>
<body>
<h1>Uptime Monitor - Public Status</h1>
<div id="monitors"></div>

<script>
async function loadMonitors() {
    const res = await fetch("/monitors");
    const monitors = await res.json();
    const container = document.getElementById("monitors");
    container.innerHTML = "";

    for (const m of monitors) {
        const statusRes = await fetch(`/status/${m.id}`);
        const statusData = await statusRes.json();
        const uptimeRes = await fetch(`/uptime/${m.id}`);
        const uptime = await uptimeRes.json();
        const checksRes = await fetch(`/checks/${m.id}`);
        const checks = await checksRes.json();

        const labels = checks.map(c => new Date(c.checked_at).toLocaleTimeString()).reverse();
        const data = checks.map(c => c.response_time).reverse();

        const div = document.createElement("div");
        div.className = "monitor";

        div.innerHTML = `
            <h2>${m.url}</h2>
            <p>Status: <span class="${statusData.status=='UP'?'up':'down'}">${statusData.status}</span></p>
            <p>Uptime: ${uptime.uptime.toFixed(2)}%</p>
            <canvas id="chart-${m.id}" width="400" height="150"></canvas>
        `;

        container.appendChild(div);

        const ctx = document.getElementById(`chart-${m.id}`).getContext("2d");
        new Chart(ctx, {
            type: "line",
            data: { labels, datasets:[{label:"Response Time (ms)", data, borderColor:"blue", fill:false}] },
            options: { animation:false, responsive:true, maintainAspectRatio:false, scales:{ y:{ beginAtZero:true } } }
        });
    }
}

loadMonitors();
setInterval(loadMonitors, 10000);
</script>
</body>
</html>
