<!DOCTYPE html>
<html>
<head>
    <title>Uptime Monitor Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
        }

        .monitor {
            border:1px solid #ddd;
            padding:15px;
            margin-bottom:20px;
        }

        .up {
            color:green;
        }

        .down {
            color:red;
        }

        .history span {
            display:inline-block;
            width:12px;
            height:12px;
            margin:2px;
            border-radius:50%;
        }

        input.url-input {
            width: 60%;
            padding:5px;
            margin-right:5px;
        }

        button {
            padding:5px 10px;
        }
    </style>
</head>
<body>

<h1>Uptime Monitor Dashboard</h1>

<h3>Add Monitor</h3>
<input id="urlInput" class="url-input" placeholder="https://example.com">
<button onclick="addMonitor()">Add</button>
<hr>

<div id="monitors"></div>

<script>
async function deleteMonitor(id){
    if(!confirm("Delete this monitor?")) return;
    await fetch(`/monitors/${id}`, { method:"DELETE" });
    loadMonitors();
}

async function editMonitor(id){
    const newURL = document.getElementById(`edit-${id}`).value;
    await fetch(`/monitors/${id}`, {
        method:"PUT",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({url:newURL})
    });
    loadMonitors();
}

async function addMonitor(){
    const url = document.getElementById("urlInput").value;
    if(!url) return alert("URL cannot be empty");
    await fetch("/monitors", {
        method:"POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({url})
    });
    document.getElementById("urlInput").value="";
    loadMonitors();
}

async function loadMonitors(){
    const res = await fetch("/monitors");
    const monitors = await res.json();
    const container = document.getElementById("monitors");
    container.innerHTML="";

    for(const m of monitors){
        const statusRes = await fetch(`/status/${m.id}`);
        const statusData = await statusRes.json();

        const uptimeRes = await fetch(`/uptime/${m.id}`);
        const uptime = await uptimeRes.json();

        const checksRes = await fetch(`/checks/${m.id}`);
        const checks = await checksRes.json();

        // Monitor div
        const div = document.createElement("div");
        div.className="monitor";

        // Edit input & button
        const editInput = `<input id="edit-${m.id}" class="url-input" value="${m.url}">`;
        const editButton = `<button onclick="editMonitor(${m.id})">Edit</button>`;

        // Delete button
        const deleteButton = `<button onclick="deleteMonitor(${m.id})">Delete</button>`;

        // History dots
        const historyHTML = `<div class="history">${checks.map(c=>`<span style="background-color:${c.status=="UP"?"green":"red"}"></span>`).join('')}</div>`;

        // Chart canvas
        const chartCanvas = `<canvas id="chart-${m.id}" width="400" height="150"></canvas>`;

        // Inner HTML
        div.innerHTML = `
            <h3>${m.url}</h3>
            <p>Status: ${statusData.status=="UP"?"🟢 UP":"🔴 DOWN"} | Uptime: ${uptime.uptime.toFixed(2)}%</p>
            ${editInput} ${editButton} ${deleteButton}
            ${historyHTML}
            ${chartCanvas}
        `;
        container.appendChild(div);

        // Chart data
        const labels = checks.map(c => new Date(c.checked_at).toLocaleTimeString()).reverse();
        const data = checks.map(c => c.response_time).reverse();
        const ctx = document.getElementById(`chart-${m.id}`).getContext("2d");

        new Chart(ctx, {
            type:"line",
            data:{
                labels: labels,
                datasets:[{
                    label:"Response Time (ms)",
                    data:data,
                    borderColor:"blue",
                    fill:false
                }]
            },
            options:{
                responsive:true,
                animation:false
            }
        });
    }
}

// Initial load
loadMonitors();

// Auto-refresh every 10s
setInterval(loadMonitors, 10000);
</script>
</body>
</html>
