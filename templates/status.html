<!DOCTYPE html>
<html>
<head>
<title>Public Status Page</title>
</head>
<body>
<h1>Public Status Page</h1>
<p>See all monitors and uptime</p>
<div id="statusContainer"></div>

<script>
async function loadStatus(){
	const res = await fetch("/monitors")
	const monitors = await res.json()
	const container = document.getElementById("statusContainer")
	container.innerHTML=""
	for(const m of monitors){
		const uptimeRes = await fetch(`/uptime/${m.id}`)
		const uptime = await uptimeRes.json()
		const statusRes = await fetch(`/status/${m.id}`)
		const statusData = await statusRes.json()
		const div = document.createElement("div")
		div.innerHTML = `<h3>${m.url}</h3>
			<p>Status: ${statusData.status=="UP"?"🟢 UP":"🔴 DOWN"}</p>
			<p>Uptime: ${uptime.uptime.toFixed(2)}%</p>`
		container.appendChild(div)
	}
}
loadStatus()
setInterval(loadStatus,10000)
</script>
</body>
</html>
